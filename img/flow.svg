<svg width="1600" height="1180" viewBox="0 0 1600 1180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F4EC"/>
      <stop offset="1" stop-color="#E9F1F7"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4B5D70"/>
    </marker>
    <style>
      .title { font: 800 42px 'Malgun Gothic', 'Noto Sans KR', sans-serif; fill: #123C69; }
      .subtitle { font: 500 19px 'Malgun Gothic', 'Noto Sans KR', sans-serif; fill: #4B5D70; }
      .section { font: 800 24px 'Malgun Gothic', 'Noto Sans KR', sans-serif; fill: #183B56; }
      .label { font: 700 20px 'Malgun Gothic', 'Noto Sans KR', sans-serif; fill: #16324F; }
      .body { font: 500 17px 'Malgun Gothic', 'Noto Sans KR', sans-serif; fill: #36536B; }
      .small { font: 600 15px 'Malgun Gothic', 'Noto Sans KR', sans-serif; fill: #557086; }
      .legend { font: 700 16px 'Malgun Gothic', 'Noto Sans KR', sans-serif; fill: #24415A; }
      .arrow { stroke: #4B5D70; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .back { stroke: #7E91A6; stroke-width: 3.5; fill: none; stroke-dasharray: 10 10; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="1180" fill="url(#bg)"/>
  <rect x="42" y="36" width="1516" height="1108" rx="34" fill="#FFFFFF" opacity="0.58"/>

  <text x="84" y="98" class="title">Virtual DOM 대시보드 흐름도</text>
  <text x="84" y="132" class="subtitle">현재 프로젝트의 실행 순서를 src/app.js, core, diff, patch, history 기준으로 정리한 그림</text>

  <g>
    <rect x="85" y="164" width="210" height="54" rx="18" fill="#DCEEFF"/>
    <circle cx="118" cy="191" r="10" fill="#4D9DE0"/>
    <text x="142" y="197" class="legend">초기화 흐름</text>

    <rect x="317" y="164" width="210" height="54" rx="18" fill="#FFE7C2"/>
    <circle cx="350" cy="191" r="10" fill="#F39C12"/>
    <text x="374" y="197" class="legend">Patch 흐름</text>

    <rect x="549" y="164" width="230" height="54" rx="18" fill="#D8F3E2"/>
    <circle cx="582" cy="191" r="10" fill="#2E8B57"/>
    <text x="606" y="197" class="legend">Undo / Redo 복원</text>
  </g>

  <g>
    <rect x="86" y="252" width="1428" height="252" rx="30" fill="#EEF6FF" stroke="#B8D7F2" stroke-width="2"/>
    <text x="116" y="300" class="section">1. 초기 부팅 흐름</text>

    <rect x="118" y="335" width="210" height="110" rx="22" fill="#FFFFFF" stroke="#9FC6EA" stroke-width="2"/>
    <text x="145" y="376" class="label">bootstrap()</text>
    <text x="145" y="406" class="body">앱 시작 진입점</text>

    <rect x="380" y="335" width="220" height="110" rx="22" fill="#FFFFFF" stroke="#9FC6EA" stroke-width="2"/>
    <text x="408" y="372" class="label">createLayout(root)</text>
    <text x="408" y="402" class="body">버튼, 루트, 상태창,</text>
    <text x="408" y="426" class="body">JSON 뷰어 생성</text>

    <rect x="652" y="335" width="235" height="110" rx="22" fill="#FFFFFF" stroke="#9FC6EA" stroke-width="2"/>
    <text x="678" y="372" class="label">createSampleBoardNode()</text>
    <text x="678" y="402" class="body">샘플 DOM 보드 생성 후</text>
    <text x="678" y="426" class="body">actualRoot에 삽입</text>

    <rect x="939" y="335" width="225" height="110" rx="22" fill="#FFFFFF" stroke="#9FC6EA" stroke-width="2"/>
    <text x="964" y="376" class="label">domToVdom()</text>
    <text x="964" y="406" class="body">실제 DOM을 initialTree</text>
    <text x="964" y="430" class="body">VDOM으로 변환</text>

    <rect x="1216" y="335" width="262" height="110" rx="22" fill="#FFFFFF" stroke="#9FC6EA" stroke-width="2"/>
    <text x="1242" y="370" class="label">mountVdom + 상태 초기화</text>
    <text x="1242" y="398" class="body">testRoot 렌더, store 생성,</text>
    <text x="1242" y="422" class="body">history 생성, 버튼 동기화</text>

    <path d="M328 390 L380 390" class="arrow"/>
    <path d="M600 390 L652 390" class="arrow"/>
    <path d="M887 390 L939 390" class="arrow"/>
    <path d="M1164 390 L1216 390" class="arrow"/>
  </g>

  <g>
    <rect x="86" y="544" width="1428" height="404" rx="30" fill="#FFF7E8" stroke="#F4D199" stroke-width="2"/>
    <text x="116" y="592" class="section">2. Patch 적용 흐름</text>
    <text x="116" y="620" class="small">핵심 데모 흐름: testRoot 수정 -> VDOM 변환 -> diff 계산 -> actualRoot에 patch 적용</text>

    <rect x="120" y="662" width="205" height="100" rx="22" fill="#FFFFFF" stroke="#F1C879" stroke-width="2"/>
    <text x="147" y="702" class="label">사용자 수정</text>
    <text x="147" y="730" class="body">testRoot 편집</text>

    <rect x="372" y="662" width="192" height="100" rx="22" fill="#FFFFFF" stroke="#F1C879" stroke-width="2"/>
    <text x="399" y="702" class="label">Patch 버튼</text>
    <text x="399" y="730" class="body">onPatch() 실행</text>

    <rect x="611" y="662" width="208" height="100" rx="22" fill="#FFFFFF" stroke="#F1C879" stroke-width="2"/>
    <text x="638" y="693" class="label">기준 트리 읽기</text>
    <text x="638" y="721" class="body">store.getTree()</text>
    <text x="638" y="745" class="body">최신 test DOM 읽기</text>

    <rect x="866" y="662" width="212" height="100" rx="22" fill="#FFFFFF" stroke="#F1C879" stroke-width="2"/>
    <text x="892" y="693" class="label">domToVdom()</text>
    <text x="892" y="721" class="body">latestTestNode 를</text>
    <text x="892" y="745" class="body">nextTree로 변환</text>

    <rect x="1125" y="662" width="196" height="100" rx="22" fill="#FFFFFF" stroke="#F1C879" stroke-width="2"/>
    <text x="1152" y="702" class="label">diff()</text>
    <text x="1152" y="730" class="body">prevTree vs nextTree</text>

    <rect x="1368" y="662" width="112" height="100" rx="22" fill="#FFFFFF" stroke="#F1C879" stroke-width="2"/>
    <text x="1390" y="702" class="label">patches</text>
    <text x="1390" y="730" class="body">결과</text>

    <rect x="246" y="812" width="218" height="104" rx="22" fill="#FFFFFF" stroke="#F1C879" stroke-width="2"/>
    <text x="272" y="853" class="label">applyPatches()</text>
    <text x="272" y="881" class="body">actualRoot DOM 갱신</text>

    <rect x="544" y="812" width="212" height="104" rx="22" fill="#FFFFFF" stroke="#F1C879" stroke-width="2"/>
    <text x="570" y="844" class="label">history.push()</text>
    <text x="570" y="872" class="body">store.setTree()</text>
    <text x="570" y="896" class="body">새 기준 저장</text>

    <rect x="836" y="812" width="250" height="104" rx="22" fill="#FFFFFF" stroke="#F1C879" stroke-width="2"/>
    <text x="862" y="844" class="label">JSON / 상태 갱신</text>
    <text x="862" y="872" class="body">현재 트리, patch 로그,</text>
    <text x="862" y="896" class="body">버튼 상태, 요약 문구</text>

    <rect x="1166" y="812" width="232" height="104" rx="22" fill="#FFF3D9" stroke="#F1C879" stroke-width="2"/>
    <text x="1193" y="853" class="label">다음 액션 대기</text>
    <text x="1193" y="881" class="body">Patch / Undo / Redo</text>

    <path d="M325 712 L372 712" class="arrow"/>
    <path d="M564 712 L611 712" class="arrow"/>
    <path d="M819 712 L866 712" class="arrow"/>
    <path d="M1078 712 L1125 712" class="arrow"/>
    <path d="M1321 712 L1368 712" class="arrow"/>
    <path d="M1424 762 C1424 815 1424 842 1398 864 L1166 864" class="arrow"/>
    <path d="M1086 864 L836 864" class="arrow"/>
    <path d="M756 864 L544 864" class="arrow"/>
    <path d="M464 864 L246 864" class="arrow"/>
  </g>

  <g>
    <rect x="86" y="976" width="1428" height="136" rx="30" fill="#EDF9F0" stroke="#B9E2C4" stroke-width="2"/>
    <text x="116" y="1022" class="section">3. Undo / Redo 복원 흐름</text>

    <rect x="218" y="1038" width="248" height="50" rx="18" fill="#FFFFFF" stroke="#9DD0AD" stroke-width="2"/>
    <text x="248" y="1070" class="label">history.undo() / redo()</text>

    <rect x="548" y="1038" width="310" height="50" rx="18" fill="#FFFFFF" stroke="#9DD0AD" stroke-width="2"/>
    <text x="575" y="1070" class="label">syncFromHistory(tree)</text>

    <rect x="940" y="1038" width="308" height="50" rx="18" fill="#FFFFFF" stroke="#9DD0AD" stroke-width="2"/>
    <text x="968" y="1070" class="label">renderBothFromTree(actual, test)</text>

    <rect x="1330" y="1038" width="130" height="50" rx="18" fill="#FFFFFF" stroke="#9DD0AD" stroke-width="2"/>
    <text x="1351" y="1070" class="label">UI 동기화</text>

    <path d="M466 1063 L548 1063" class="arrow"/>
    <path d="M858 1063 L940 1063" class="arrow"/>
    <path d="M1248 1063 L1330 1063" class="arrow"/>
    <path d="M1395 1038 C1395 1008 1395 984 1180 950" class="back"/>
  </g>

  <g>
    <rect x="1280" y="248" width="236" height="240" rx="24" fill="#16324F" opacity="0.96"/>
    <text x="1310" y="288" style="font: 800 22px 'Malgun Gothic', 'Noto Sans KR', sans-serif; fill: #FFFFFF;">핵심 실행 객체</text>
    <text x="1310" y="328" style="font: 700 17px 'Malgun Gothic', 'Noto Sans KR', sans-serif; fill: #CFE6FF;">actualRoot</text>
    <text x="1310" y="352" class="small" style="fill:#D9E8F4;">최종 결과가 보이는 DOM</text>
    <text x="1310" y="392" style="font: 700 17px 'Malgun Gothic', 'Noto Sans KR', sans-serif; fill: #FFE2A9;">testRoot</text>
    <text x="1310" y="416" class="small" style="fill:#D9E8F4;">사용자 수정 실험 DOM</text>
    <text x="1310" y="456" style="font: 700 17px 'Malgun Gothic', 'Noto Sans KR', sans-serif; fill: #BEE7C8;">store</text>
    <text x="1310" y="480" class="small" style="fill:#D9E8F4;">현재 기준 VDOM</text>
    <text x="1310" y="520" style="font: 700 17px 'Malgun Gothic', 'Noto Sans KR', sans-serif; fill: #BEE7C8;">history</text>
    <text x="1310" y="544" class="small" style="fill:#D9E8F4;">Undo / Redo 스냅샷</text>
  </g>
</svg>
